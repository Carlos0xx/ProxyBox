name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - name: ruff check
        run: ruff check app/ bot/
      - name: ruff format --check
        run: ruff format --check app/ bot/

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck install
        run: sudo apt-get -y install shellcheck
      - run: shellcheck -S warning deploy/install.sh scripts/pii-check.sh
