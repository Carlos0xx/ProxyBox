name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: install
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: pytest
        run: pytest -v --tb=short tests/
