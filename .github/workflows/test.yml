name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.13"
      - name: install
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: pytest
        run: pytest -v --tb=short tests/

  pip-audit:
    name: pip-audit (dependency CVE scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.13"
      - name: install pip-audit + project deps
        run: |
          pip install --upgrade pip pip-audit
          pip install -e .
      - name: scan installed environment
        # --strict: any vulnerability fails CI. We ship a single binary
        # surface (FastAPI + sing-box), so a CVE in any dep is actionable.
        run: pip-audit --strict
